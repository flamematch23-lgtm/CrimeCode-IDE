name: Release Desktop Windows

# Build and publish the CrimeCode Desktop Windows installer on every tag push.
# Trigger examples:
#   git tag v1.0.0 && git push origin v1.0.0
# Or manually from Actions → "Release Desktop Windows" → Run workflow.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required to create GitHub Releases and upload assets

jobs:
  build-windows:
    name: Build + Release (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # needed for git rev-parse HEAD in build.ts

      - name: Derive tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ────────────────────────────────────────────────────────────────────
      # 1. Build the OpenCode CLI (the "sidecar" binary the desktop ships)
      # ────────────────────────────────────────────────────────────────────
      - name: Build OpenCode CLI (sidecar)
        shell: bash
        env:
          OPENCODE_CHANNEL: prod
        run: |
          # --single: only build for current runner (windows-x64), skip linux/darwin
          bun run --cwd packages/opencode script/build.ts -- --single --skip-embed-web-ui
          # List what we built
          ls packages/opencode/dist/ || ls packages/opencode/dist-*/
          find packages/opencode -name "*.exe" -type f 2>/dev/null | head -10

      - name: Build Proxy
        run: bun run --cwd packages/proxy build

      - name: Stage sidecar into desktop-electron
        shell: bash
        run: |
          mkdir -p packages/desktop-electron/sidecar
          # CLI build output lives at packages/opencode/dist/opencode-windows-x64/bin/opencode.exe
          SIDECAR=$(find packages/opencode/dist -name "opencode.exe" -path "*windows-x64*" 2>/dev/null | head -1)
          if [ -z "$SIDECAR" ]; then
            SIDECAR=$(find packages/opencode/dist -name "opencode.exe" 2>/dev/null | head -1)
          fi
          if [ -z "$SIDECAR" ]; then
            echo "::error::opencode.exe not found under packages/opencode/dist/"
            find packages/opencode/dist -type f | head -50 || true
            exit 1
          fi
          echo "Using sidecar: $SIDECAR"
          cp "$SIDECAR" packages/desktop-electron/sidecar/opencode-cli.exe
          ls -la packages/desktop-electron/sidecar/

      # Compile the Burp Workspace MITM proxy as a standalone Windows exe.
      # Senza questo step l'utente vedrebbe "Script http-proxy.ts non trovato"
      # cliccando "Avvia proxy ora" nella UI Burp Workspace, perché lo script
      # ts richiede il bun runtime che non shippiamo separatamente.
      - name: Build Burp proxy CLI (standalone)
        shell: bash
        run: |
          bun build --compile --target=bun-windows-x64 \
            packages/opencode/script/agent-tools/security/http-proxy.ts \
            --outfile packages/desktop-electron/sidecar/burp-proxy-cli.exe
          ls -la packages/desktop-electron/sidecar/burp-proxy-cli.exe || {
            echo "::error::burp-proxy-cli.exe was not produced"
            exit 1
          }

      # ────────────────────────────────────────────────────────────────────
      # 2. Decode Windows code-signing certificate (optional)
      # ────────────────────────────────────────────────────────────────────
      - name: Decode code-signing cert
        if: ${{ env.SIGN_CERT_BASE64 != '' }}
        shell: pwsh
        env:
          SIGN_CERT_BASE64: ${{ secrets.SIGN_CERT_BASE64 }}
        run: |
          if ($env:SIGN_CERT_BASE64) {
            $bytes = [Convert]::FromBase64String($env:SIGN_CERT_BASE64)
            $certPath = Join-Path $PWD "packages\desktop-electron\sidecar\cert.pfx"
            [IO.File]::WriteAllBytes($certPath, $bytes)
            Write-Host "Certificate decoded to $certPath"
          }

      # ────────────────────────────────────────────────────────────────────
      # 3. Build the Windows installer (electron-vite + electron-builder NSIS)
      # ────────────────────────────────────────────────────────────────────
      - name: Build Windows installer
        shell: bash
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_ADMIN_PASSPHRASE_SHA256: ${{ secrets.OPENCODE_ADMIN_PASSPHRASE_SHA256 }}
          OPENCODE_CHECKOUT_BASE_URL: "https://t.me/OpCrime1312"
          # Vite-baked URL del canale community Telegram. Cambia qui se sposti
          # a un canale diverso. È baked nel bundle (import.meta.env), quindi
          # serve un nuovo build per propagare il cambio. Default fallback in
          # codice è lo stesso URL (community.tsx).
          VITE_TELEGRAM_CHANNEL_URL: "https://t.me/OpCrimeGPT"
          SIGN_PASS: ${{ secrets.SIGN_PASS }}
          SIGN_PUBLISHER: ${{ secrets.SIGN_PUBLISHER }}
          SKIP_SIDECAR_STASH: "1" # CI has no OneDrive locks, stash not needed
          # electron-builder auto-publishes on tag; give it a GH token OR
          # pass --publish never to disable implicit upload. We use the
          # softprops/action-gh-release step below, so disable implicit.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: "true" # treat as draft so implicit publish doesn't clash
        run: |
          bun run --cwd packages/desktop-electron build:win

      - name: List release artifacts
        shell: bash
        run: |
          ls -la packages/desktop-electron/dist/
          echo "---"
          du -h packages/desktop-electron/dist/*.exe 2>/dev/null || true

      # ────────────────────────────────────────────────────────────────────
      # 4. Publish to GitHub Releases
      # ────────────────────────────────────────────────────────────────────
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CrimeCode Desktop ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            packages/desktop-electron/dist/*.exe
            packages/desktop-electron/dist/*.exe.blockmap
            packages/desktop-electron/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          echo "## 🚀 Release ${{ steps.tag.outputs.tag }} published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Installer download:" >> $GITHUB_STEP_SUMMARY
          echo "- https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/opencode-electron-win-x64.exe" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Latest always:" >> $GITHUB_STEP_SUMMARY
          echo "- https://github.com/${{ github.repository }}/releases/latest/download/opencode-electron-win-x64.exe" >> $GITHUB_STEP_SUMMARY

      # ────────────────────────────────────────────────────────────────────
      # 5. Auto-post release announcement al canale Telegram CrimeCode IDE
      # ────────────────────────────────────────────────────────────────────
      # Skip se TELEGRAM_BOT_TOKEN o TELEGRAM_CHANNEL_ID non sono settati
      # (es. PR/fork/dev). In quei casi continua silently.
      - name: Post release to Telegram channel
        if: ${{ env.TELEGRAM_CHANNEL_ID != '' && env.TELEGRAM_BOT_TOKEN != '' }}
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          # Estrai il body release notes da GitHub (max 800 char per Telegram limit)
          NOTES=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null | head -c 800 || echo "")
          DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/opencode-electron-win-x64.exe"

          # Markdown V2 per Telegram (escaping necessario per `_*[]()~\`>#+-=|{}.!`)
          # Per simplicità usiamo HTML mode che è meno fragile.
          MSG=$(cat <<EOF
🚀 <b>CrimeCode IDE $TAG</b>

$(echo "$NOTES" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

📥 <a href="$DOWNLOAD_URL">Download Windows installer</a>
📋 <a href="https://github.com/$REPO/releases/tag/$TAG">Release notes complete</a>

#crimecode #release
EOF
)
          # Invia con disable_web_page_preview=false per mostrare preview download
          curl -sS --max-time 15 -X POST \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHANNEL_ID" \
              --arg text "$MSG" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: false}')" \
            | jq '. | {ok, message_id: .result.message_id, error: .description}' || true
