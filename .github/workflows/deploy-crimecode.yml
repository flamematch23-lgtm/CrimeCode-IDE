name: Deploy CrimeCode (API + Web)

# Auto-deploy the OpenCode API server (Fly.io) and the web app
# (Cloudflare Pages) on every push to master that touches relevant paths.

on:
  push:
    branches: [master]
    paths:
      # API server changes
      - "packages/opencode/**"
      - "packages/util/**"
      - "packages/sdk/**"
      - "packages/plugin/**"
      - "packages/console/**"
      - "packages/enterprise/**"
      - "packages/slack/**"
      - "Dockerfile.api"
      - "deploy/api/**"
      - ".dockerignore"
      # Web app changes
      - "packages/app/**"
      - "packages/ui/**"
      - "deploy/web/**"
      # Workspace deps
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".github/workflows/deploy-crimecode.yml"
  workflow_dispatch: # manual trigger from Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Backend → Fly.io
  # ───────────────────────────────────────────────────────────────────────
  deploy-api:
    name: API → Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (remote builder)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config deploy/api/fly.toml \
            --app crimecode-api \
            --remote-only \
            --wait-timeout 600

      - name: Health check
        run: |
          # Hit the public canonical URL (api.crimecode.cc) — the renderer
          # talks to that, so the deploy is only "good" if DNS, the
          # crimecode.cc → Fly CNAME, and the custom-domain SSL cert all
          # work. The bare Fly URL would pass even with a broken cert or
          # missing DNS, masking real production breakage.
          #
          # 200 (no auth) or 401 (auth required) both prove the process
          # is listening behind a working TLS termination — anything else
          # is dead.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.crimecode.cc/ || echo 000)
            case "$code" in
              200|401)
                echo "API responsive at api.crimecode.cc (HTTP $code)"
                exit 0
                ;;
              *)
                echo "Attempt $i: HTTP $code; retrying in 10s..."
                sleep 10
                ;;
            esac
          done
          echo "API health check failed after 5 attempts"
          exit 1

  # ───────────────────────────────────────────────────────────────────────
  # Frontend → Cloudflare Pages
  # ───────────────────────────────────────────────────────────────────────
  deploy-web:
    name: Web → Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app (with prod API URL)
        env:
          # Custom domain via Fly.io certs (api.crimecode.cc → Fly.io);
          # fly.dev fallback stays functional for internal tests.
          VITE_API_URL: https://api.crimecode.cc
        run: bun run --cwd packages/app build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: crimecode-web
          directory: packages/app/dist
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Show deploy URL
        run: echo "Web app live at https://crimecode-web.pages.dev"
