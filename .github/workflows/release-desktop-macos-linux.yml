name: Release Desktop (macOS + Linux)

# Mirror of release-desktop-windows.yml for macOS and Linux targets.
# Triggered by the same v* tags; runs in parallel with the Windows job.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (arm64)
            package: package:mac
            artifacts: |
              packages/desktop-electron/dist/*.dmg
              packages/desktop-electron/dist/*.zip
              packages/desktop-electron/dist/*.dmg.blockmap
              packages/desktop-electron/dist/latest-mac.yml
          - os: ubuntu-latest
            label: Linux (x64)
            package: package:linux
            artifacts: |
              packages/desktop-electron/dist/*.AppImage
              packages/desktop-electron/dist/*.deb
              packages/desktop-electron/dist/*.rpm
              packages/desktop-electron/dist/latest-linux.yml

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Derive tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build OpenCode CLI (sidecar)
        shell: bash
        env:
          OPENCODE_CHANNEL: prod
        run: |
          bun run --cwd packages/opencode script/build.ts -- --single --skip-embed-web-ui

      - name: Stage sidecar
        shell: bash
        run: |
          mkdir -p packages/desktop-electron/sidecar
          SIDECAR=$(find packages/opencode/dist -name "opencode" -type f -path "*linux*" 2>/dev/null | head -1)
          if [ -z "$SIDECAR" ]; then
            SIDECAR=$(find packages/opencode/dist -name "opencode" -type f -path "*darwin*" 2>/dev/null | head -1)
          fi
          if [ -z "$SIDECAR" ]; then
            SIDECAR=$(find packages/opencode/dist -name "opencode" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$SIDECAR" ]; then
            echo "::error::opencode binary not found"
            find packages/opencode/dist -type f | head -20
            exit 1
          fi
          echo "Sidecar: $SIDECAR"
          cp "$SIDECAR" packages/desktop-electron/sidecar/opencode-cli
          ls -la packages/desktop-electron/sidecar/

      - name: Build installer
        shell: bash
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_ADMIN_PASSPHRASE_SHA256: ${{ secrets.OPENCODE_ADMIN_PASSPHRASE_SHA256 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun run --cwd packages/desktop-electron build
          bun run --cwd packages/desktop-electron ${{ matrix.package }}

      - name: List artifacts
        shell: bash
        run: ls -la packages/desktop-electron/dist/ || true

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CrimeCode Desktop ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          fail_on_unmatched_files: false
          files: ${{ matrix.artifacts }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
