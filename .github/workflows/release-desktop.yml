name: Release Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          powershell -Command "irm bun.sh/install.ps1|iex"
          echo "C:\Users\runneradmin\.bun\bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: bun install

      - name: Build desktop app (Windows .exe)
        run: |
          cd packages/desktop
          bun run release:bundle
          # oppure usa electron-builder se il comando è diverso:
          # bun run package:win

      - name: Find installer
        id: find_exe
        run: |
          $exe = Get-ChildItem -Path "packages/desktop/dist" -Filter "*.exe" | Select-Object -First 1
          echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.EXE_PATH }}
          tag_name: ${{ github.ref_name }}
          name: "CrimeCode Desktop ${{ github.ref_name }}"
          body: |
            Release ${{ github.ref_name }} con fix sessioni, retry UI avanzato e CI automatizzata.
            Include:
            - Fix configurazione JSONC
            - Session loading robusto con fallback UI
            - Retry button con tooltip e auto-retry con backoff
            - Health endpoint e test automatizzati
            - GitHub Actions CI per health e session loading
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
