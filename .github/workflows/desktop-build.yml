name: desktop-build

# Builds the desktop installer (Win/Mac/Linux) for development sanity checks.
#
# Runs on:
#   - manual `workflow_dispatch` (any branch, channel selectable)
#   - tag pushes `desktop-build-v*` if you want a manual one-off build
#
# Does NOT run on every push to master/dev anymore — that was duplicating
# the work of `release-desktop-windows.yml` + `release-desktop-macos-linux.yml`
# (which fire on `v*` tags) and burning ~30 min of GitHub Actions per push.
# The duplicate `release` job that produced a draft GitHub Release on every
# push was also the one tripping the spending limit and turning the workflow
# red — it's been removed because the tag-based release workflows already
# publish the real release.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Build channel"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - beta
          - prod
  push:
    tags:
      - "desktop-build-v*"

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine channel
        id: channel
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            echo "channel=${{ github.event.inputs.channel }}" >> "$GITHUB_OUTPUT"
          elif [ -n "$OPENCODE_CHANNEL" ]; then
            echo "channel=$OPENCODE_CHANNEL" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        shell: bash
        run: bun install --frozen-lockfile

      - name: Build CLI (sidecar)
        shell: bash
        env:
          OPENCODE_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          bun run --cwd packages/opencode script/build.ts -- --single --skip-embed-web-ui

      - name: Build desktop app
        shell: bash
        env:
          OPENCODE_CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          cd packages/desktop-electron
          bun run build
          bun run package:${{ matrix.platform }}

      - name: Upload Windows installer
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: opencode-desktop-windows-installer
          path: packages/desktop-electron/dist/*.exe
          retention-days: 7

      - name: Upload macOS disk image
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: opencode-desktop-macos-dmg
          path: packages/desktop-electron/dist/*.dmg
          retention-days: 7

      - name: Upload Linux packages
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: opencode-desktop-linux-packages
          path: packages/desktop-electron/dist/*
          retention-days: 7
