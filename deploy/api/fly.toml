# fly.toml — deploy the OpenCode headless API server to Fly.io
#
# Quick start:
#   cd <repo root>
#   fly apps create crimecode-api                                       # once
#   fly secrets set OPENCODE_SERVER_PASSWORD=<random> -a crimecode-api  # once
#   fly deploy --config deploy/api/fly.toml --dockerfile deploy/api/Dockerfile
#
# Public URL: https://crimecode-api.fly.dev (HTTPS, automatic certs)
# The free-tier allowance covers ~1 shared-cpu-1x machine with 512mb memory
# running 24/7 (within Fly's monthly free-tier). Scale up with `fly scale`.

app = "crimecode-api"
primary_region = "fra"  # Frankfurt — low latency for EU users. See `fly platform regions` for alternatives.

[build]
  # Build context is the repo root. Fly copies only files not in .dockerignore.
  # Path relative to fly.toml location.
  dockerfile = "../../Dockerfile.api"

[env]
  OPENCODE_CHANNEL = "prod"
  # OPENCODE_SERVER_PASSWORD is set via `fly secrets set` and NEVER committed.
  # License DB lives on the persistent volume mounted at /data.
  LICENSE_DB_PATH = "/data/licenses.db"
  # OPENCODE_ADMIN_PASSPHRASE_SHA256, LICENSE_HMAC_SECRET, TELEGRAM_BOT_TOKEN,
  # TELEGRAM_ADMIN_USER_IDS are set via `fly secrets set`.

[mounts]
  source = "license_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 4096
  force_https = true
  auto_stop_machines = "off"   # keep the machine always-on for 24/7 availability
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  # With the compiled Bun binary (Dockerfile stage 2), RSS is ~80 MB and
  # virtual memory is ~300 MB — fits comfortably in the free tier.
  # Previous 8GB+4cpu was a workaround for `bun run src/index.ts` mmap
  # explosion, no longer needed.
  size = "shared-cpu-1x"
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
